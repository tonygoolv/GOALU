{% extends "base.html" %}

{% block content %}
<div class="error-state">
    <div class="error-icon">⚠️</div>
    <h3>Something Went Wrong</h3>
    <p>We encountered an issue loading the store.</p>
    <p style="margin-top: 1.5rem; font-family: monospace; font-size: 0.9rem; background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); color:#fca5a5;">{{ err_msg }}</p>
    
    <a href="/" class="buy-btn" style="display:inline-block; margin-top:2rem; text-decoration:none;">Return to Store</a>
</div>
{% endblock %}
